<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Torus · WebXR Scene</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700&display=swap');
    

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --olive:   #6b7c3e;
      --blue:    #2979ff;
      --dark:    #0a0c0f;
      --panel:   rgba(10, 12, 15, 0.82);
      --border:  rgba(107, 124, 62, 0.35);
      --text:    #d4dcc2;
      --accent:  #aec65e;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Share Tech Mono', monospace;
      color: var(--text);
    }

    #canvas-container {
      position: fixed; inset: 0;
    }

    canvas { display: block; }

    /* ── HUD overlay ── */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none;
      display: flex; flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      z-index: 10;
    }

    /* top-left title */
    #title-block {
      display: flex; flex-direction: column; gap: 4px;
    }
    #title-block h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      line-height: 1;
    }
    #title-block p {
      font-size: .68rem;
      opacity: .5;
      letter-spacing: .08em;
    }

    /* bottom row */
    #bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    /* stats panel */
    #stats-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      backdrop-filter: blur(8px);
      font-size: .68rem;
      line-height: 1.9;
      color: var(--text);
      opacity: .85;
    }
    #stats-panel span { color: var(--accent); }

    /* XR button */
    #xr-btn {
      pointer-events: all;
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: .8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 4px;
      cursor: pointer;
      transition: background .2s, color .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    #xr-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .25s ease;
      z-index: -1;
    }
    #xr-btn:hover::before { transform: scaleX(1); }
    #xr-btn:hover { color: var(--dark); box-shadow: 0 0 18px rgba(174,198,94,.35); }
    #xr-btn:disabled { opacity: .35; cursor: not-allowed; border-color: #555; color: #555; }
    #xr-btn:disabled::before { display: none; }

    /* corner scan-line decoration */
    #hud::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(0,0,0,.06) 3px,
        rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
    }

    /* vignette */
    #vignette {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.75) 100%);
    }

    #xr-not-supported {
      display: none;
      position: fixed;
      bottom: 80px; right: 24px;
      background: var(--panel);
      border: 1px solid #c0392b55;
      color: #e74c3c;
      font-size: .68rem;
      padding: 8px 14px;
      border-radius: 4px;
      backdrop-filter: blur(6px);
      z-index: 20;
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>
<div id="vignette"></div>

<div id="hud">
  <div id="title-block">
    <h1>Torus Scene</h1>
    <p>Three.js · WebXR · Isometric</p>
  </div>
  <div id="bottom-row">
    <div id="stats-panel">
      Plane &nbsp;&nbsp;<span>5m × 3m</span><br>
      Torus R&nbsp;<span>0.25 m</span><br>
      Rotation<span> Z · 3 s/rev</span><br>
      Lights &nbsp;<span>2 × Spot</span>
    </div>
    <button id="xr-btn">Enter XR</button>
  </div>
</div>

<div id="xr-not-supported">WebXR not available on this device/browser.</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
//<script src="https://www.jsdelivr.com/package/npm/three-gltf-loader"></script>
<script>
(function () {
  /* ── renderer ── */
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.xr.enabled = true;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  /* ── scene ── */
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0c0f);
  scene.fog = new THREE.Fog(0x0a0c0f, 12, 22);

  /* ── plane ── */
  const planeGeo  = new THREE.PlaneGeometry(5, 3);
  const planeMat  = new THREE.MeshStandardMaterial({
    color: 0x4a5c2a,      // olive green
    roughness: 0.88,
    metalness: 0.05,
  });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  plane.rotation.x = -Math.PI / 2;
  plane.receiveShadow = true;
  scene.add(plane);

  /* ── grid helper (5 × 3, 1-metre cells) ── */
  // GridHelper(size, divisions) — we use size=5, div=5 for 1 m cells on X
  // For a non-square plane we overlay two grids clipped visually
  const gridMain = new THREE.GridHelper(5, 5, 0x6b7c3e, 0x3a4a1e);
  gridMain.position.y = 0.002;
  scene.add(gridMain);
  // extra lines on Z axis to match 3 m depth
  const gridZ = new THREE.GridHelper(3, 3, 0x6b7c3e, 0x3a4a1e);
  gridZ.position.y = 0.002;
  scene.add(gridZ);

  /* ── torus ── */
  const torusGeo = new THREE.TorusGeometry(0.25, 0.06, 32, 100);
  const torusMat = new THREE.MeshStandardMaterial({
    color: 0x2979ff,
    roughness: 0.25,
    metalness: 0.6,
    emissive: 0x0d3080,
    emissiveIntensity: 0.15,
  });
  const torus = new THREE.Mesh(torusGeo, torusMat);
  torus.position.set(2, 0.75, 0);
  torus.castShadow  = true;
  torus.receiveShadow = true;
  scene.add(torus);

  /* ── torus duplicate (z = 1) ── */
  const torus2 = new THREE.Mesh(torusGeo, torusMat);
  torus2.position.set(2, 0.75, 1);
  torus2.castShadow    = true;
  torus2.receiveShadow = true;
  scene.add(torus2);

  /* ── torus duplicates at x = -2 ── */
  const torus3 = new THREE.Mesh(torusGeo, torusMat);
  torus3.position.set(-1, 0.75, 0);
  torus3.castShadow    = true;
  torus3.receiveShadow = true;
  scene.add(torus3);

  const torus4 = new THREE.Mesh(torusGeo, torusMat);
  torus4.position.set(-1, 0.75, 1);
  torus4.castShadow    = true;
  torus4.receiveShadow = true;
  scene.add(torus4);
/* -- Spinner --*/

 const loader = new GLTFLoader();
const gltf = await loader.loadAsync('cardboard_rocket.glb');
scene.add( gltf.scene ); 
  
  /* ── yellow cube ── */
  const cubeGeo = new THREE.BoxGeometry(0.125, 0.125, 0.125);
  const cubeMat = new THREE.MeshStandardMaterial({
    color: 0xffe033,
    roughness: 0.35,
    metalness: 0.15,
    emissive: 0x7a5500,
    emissiveIntensity: 0.1,
  });
  const cube = new THREE.Mesh(cubeGeo, cubeMat);
  cube.position.set(0.75, 0.2, 0);
  cube.castShadow    = true;
  cube.receiveShadow = true;
  scene.add(cube);

  /* ── cylinder (tapered: base r=0.1, top r=0.04, h=2.5 m) ── */
  // CylinderGeometry(radiusTop, radiusBottom, height, radialSegments)
  const cylGeo = new THREE.CylinderGeometry(0.04, 0.1, 2.5, 32);
  const cylMat = new THREE.MeshStandardMaterial({
    color: 0xc0c0c0,
    roughness: 0.4,
    metalness: 0.55,
  });
  const cylinder = new THREE.Mesh(cylGeo, cylMat);
  cylinder.position.set(4.5, 1.0, -1.28);
  cylinder.rotation.x = 5 * (Math.PI / 180);
  cylinder.castShadow    = true;
  cylinder.receiveShadow = true;
  scene.add(cylinder);

  /* ── cap cube atop cylinder (.3x, .05y, .5z) — parented to cylinder ── */
  // Cylinder half-height = 1.25 m, so top sits at local y = 1.25
  const capGeo = new THREE.BoxGeometry(0.3, 0.05, 0.5);
  const capMat = new THREE.MeshStandardMaterial({
    color: 0xc0c0c0,
    roughness: 0.4,
    metalness: 0.55,
  });
  const capCube = new THREE.Mesh(capGeo, capMat);
  capCube.position.set(0, 1.275, 0.25);
  capCube.rotation.x = -5 * (Math.PI / 180);
  capCube.castShadow    = true;
  capCube.receiveShadow = true;
  cylinder.add(capCube);

  /* ── spotlights (no ambient) ── */
  function makeSpot(color, intensity, x, y, z, targetX, targetY, targetZ) {
    const spot = new THREE.SpotLight(color, intensity);
    spot.position.set(x, y, z);
    spot.angle   = Math.PI / 7;
    spot.penumbra = 0.35;
    spot.decay   = 1.8;
    spot.distance = 12;
    spot.castShadow = true;
    spot.shadow.mapSize.width  = 1024;
    spot.shadow.mapSize.height = 1024;
    spot.shadow.camera.near = 0.5;
    spot.shadow.camera.far  = 14;
    spot.target.position.set(targetX, targetY, targetZ);
    scene.add(spot);
    scene.add(spot.target);
    return spot;
  }

  // warm key light (left-front) — no shadow casting
  const spot1 = makeSpot(0xfff4d0, 3.5,  3, 5,  3,  0, 0, 0);
  spot1.castShadow = false;
  // cool fill light (right-back)
  makeSpot(0xc8d8ff, 2.0, -3, 4, -2,  0, 0, 0);

  // focused downward spot over cylinder (20° beam) — parented to cylinder
  const cylSpot = new THREE.SpotLight(0xffffff, 4.0);
  // position relative to cylinder: above it, moved down 0.5m
  cylSpot.position.set(0, 0.775, 1);
  cylSpot.angle    = (40 / 2) * (Math.PI / 180); // half-angle = 20°
  cylSpot.penumbra = 0.3;
  cylSpot.decay    = 1.5;
  cylSpot.distance = 8;
  cylSpot.castShadow = true;
  cylSpot.shadow.mapSize.width  = 1024;
  cylSpot.shadow.mapSize.height = 1024;
  cylSpot.shadow.camera.near = 0.1;
  cylSpot.shadow.camera.far  = 10;
  // +45° X tilt — target offset in local space
  const tiltZ = 0.775 * Math.tan(45 * Math.PI / 180);
  cylSpot.target.position.set(0, -0.775, tiltZ);
  cylinder.add(cylSpot);
  cylinder.add(cylSpot.target);

  /* ── perspective camera + orbit controls ── */
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(4, 4, 4);
  camera.lookAt(0, 0, 0);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping  = true;
  controls.dampingFactor  = 0.08;
  controls.screenSpacePanning = false;
  controls.minDistance    = 1;
  controls.maxDistance    = 20;
  controls.target.set(0, 0.5, 0);
  controls.update();

  /* ── resize ── */
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  /* ── animation loop ── */
  const Z_RATE = (2 * Math.PI) / 3;  // full Z rotation every 3 seconds (rad/s)
  const clock  = new THREE.Clock();

  // Y-axis wobble keyframes over a 3-second cycle:
  //   0 → 1s : 0° → +2°
  //   1 → 2s : +2° → -3°
  //   2 → 3s : -3° → 0°
  const DEG = Math.PI / 180;
  const Y_KEYS = [
    { t: 0,   y:  0        },
    { t: 1/3, y:  2 * DEG  },
    { t: 2/3, y: -3 * DEG  },
    { t: 1,   y:  0        },
  ];

  // Cubic ease-in-out between two values
  function easeInOut(a, b, t) {
    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    return a + (b - a) * e;
  }

  function getYWobble(cycleT) {
    // cycleT in [0,1) — find surrounding keyframes
    for (let i = 0; i < Y_KEYS.length - 1; i++) {
      const k0 = Y_KEYS[i], k1 = Y_KEYS[i + 1];
      if (cycleT >= k0.t && cycleT <= k1.t) {
        const span = k1.t - k0.t;
        const local = (cycleT - k0.t) / span;
        return easeInOut(k0.y, k1.y, local);
      }
    }
    return 0;
  }

  function animate() {
    const dt      = clock.getDelta();
    const elapsed = clock.elapsedTime;

    // Continuous Z spin
    torus.rotation.z  += Z_RATE * dt;
    torus2.rotation.z += Z_RATE * dt;
    torus3.rotation.z += Z_RATE * dt;
    torus4.rotation.z += Z_RATE * dt;

    // Y wobble — repeating 3-second cycle
    const cycleT = (elapsed % 3) / 3;
    torus.rotation.y  = getYWobble(cycleT);
    torus2.rotation.y = getYWobble(cycleT);
    torus3.rotation.y = getYWobble(cycleT);
    torus4.rotation.y = getYWobble(cycleT);

    controls.update();

    // Cylinder X animation — 4-second loop:
    //   0→1s : 4.5 → -4.5  (ease-in-out sweep)
    //   1s   : snap instantly to 4.5 (no easing)
    //   1→3s : hold at 4.5
    //   3→4s : 4.5 → -4.5  (ease-in-out sweep)
    //   loop
    const cylT = elapsed % 4;
    let cylX;
    if (cylT < 1) {
      cylX = easeInOut(4.5, -4.5, cylT);   // sweep left
    } else if (cylT < 3) {
      cylX = 4.5;                            // snap to +4.5 and hold
    } else {
      cylX = easeInOut(4.5, -4.5, cylT - 3); // sweep left again
    }
    cylinder.position.x = cylX;

    renderer.render(scene, camera);
  }

  renderer.setAnimationLoop(animate);

  /* ── WebXR ── */
  const xrBtn       = document.getElementById('xr-btn');
  const xrNoSupport = document.getElementById('xr-not-supported');
  let   xrSession   = null;

  // XR cameras stay at world origin; we position the scene above the floor
  // so the torus appears on the real floor in XR.
  async function enterXR() {
    if (!navigator.xr) { showNoSupport(); return; }
    const supported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (!supported) { showNoSupport(); return; }

    xrSession = await navigator.xr.requestSession('immersive-vr', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['bounded-floor', 'hand-tracking'],
    });

    renderer.xr.setSession(xrSession);
    xrBtn.textContent = 'Exit XR';

    xrSession.addEventListener('end', () => {
      xrSession = null;
      xrBtn.textContent = 'Enter XR';
    });
  }

  function exitXR() {
    if (xrSession) xrSession.end();
  }

  function showNoSupport() {
    xrNoSupport.style.display = 'block';
    setTimeout(() => xrNoSupport.style.display = 'none', 3500);
  }

  xrBtn.addEventListener('click', () => {
    if (xrSession) exitXR(); else enterXR();
  });

  // dim button text if XR is definitely unavailable
  if (!('xr' in navigator)) {
    xrBtn.disabled = true;
    xrBtn.title = 'WebXR is not supported in this browser.';
  }

})();
</script>
</body>
</html>
